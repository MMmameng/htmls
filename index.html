<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《北京人》剧中人性格测试</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --primary-bg: #f5f1e8;
            --text-color: #3d352e;
            --accent-color: #8c6f56;
            --button-bg: #4a4035;
            --button-text: #f5f1e8;
            --card-bg: #faf6f0;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
            transition: all 0.5s ease-in-out;
        }

        h1, h2 {
            color: var(--button-bg);
        }

        p {
            line-height: 1.8;
            font-size: 1.1em;
        }
        
        .progress-bar {
            width: 100%;
            background-color: #e0d9cd;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress {
            width: 0;
            height: 10px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        button {
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-family: 'Noto Serif SC', serif;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 20px;
        }

        button:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .quiz-screen, .result-screen {
            display: none;
        }
        
        .question-container {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .answer-btn {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 15px;
            font-size: 1em;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }
        
        .answer-btn:hover {
            background-color: var(--accent-color);
            color: var(--button-text);
        }

        .result-card {
            animation: fadeIn 1s ease;
        }
        
        .character-name {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--accent-color);
            margin: 10px 0;
        }
        
        .character-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #e0d9cd;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            color: var(--accent-color);
            border: 5px solid var(--card-bg);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        
        .similarity {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .description-box {
            text-align: left;
            background-color: var(--primary-bg);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .description-box h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            color: var(--button-bg);
        }
        
        .description-box p {
            font-size: 1em;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Start Screen -->
        <div id="start-screen">
            <h1>《北京人》“剧”中人</h1>
            <h2>性格测试</h2>
            <p>欢迎来到日薄西山的曾家大院。在这里，过去与未来交织，压抑与渴望碰撞。</p>
            <p>选择最贴近你内心想法的答案，看看你是这围城中的哪一位“北京人”。</p>
            <button id="start-btn">开始测试</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <div id="question-container" class="question-container">
                <h2 id="question"></h2>
                <div id="answers" class="answers"></div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen">
            <div class="result-card">
                <p>测试结果</p>
                <div id="character-image" class="character-image"></div>
                <h1 id="character-name"></h1>
                <p id="similarity" class="similarity"></p>
                
                <div class="description-box">
                    <h3 id="tags"></h3>
                    <p id="fun-desc"></p>
                </div>
                
                <div class="description-box">
                    <h3>人物深剖</h3>
                    <p id="serious-desc"></p>
                </div>
                
                <button id="restart-btn">重新测试</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---

        // Personality Dimensions (from -5 to 5)
        // tradition_vs_modern: 守旧 vs. 现代
        // control_vs_freedom: 控制 vs. 自由
        // selfish_vs_selfless: 利己 vs. 利他
        // passive_vs_active: 消极 vs. 积极
        // idealist_vs_pragmatist: 理想 vs. 现实
        // inner_vs_outer: 内敛 vs. 外放

        const characters = [
            { name: "曾皓", image: "皓", tags: "#老派大家长 #活在梦里 #全家靠我画饼充饥", funDesc: "你是“往昔辉煌”的忠实粉丝，朋友圈置顶的永远是“想当年”。作为家庭气氛组的暴躁担当，你的口头禅是“岂有此理！”。虽然兜比脸干净，但“排面”是你最后的倔强。", seriousDesc: "你是一个被时代抛弃的悲剧人物。你紧紧抓住那口象征着家族荣耀的棺木，以为守住了它，就守住了过去的尊严。然而，这口棺木也囚禁了你和整个家庭的未来。你的专制与怀旧，并非源于真正的强大，而是对现实衰败的恐惧。", scores: { tradition_vs_modern: 5, control_vs_freedom: 5, selfish_vs_selfless: 4, passive_vs_active: -3, idealist_vs_pragmatist: 4, inner_vs_outer: 4 } },
            { name: "曾文清", image: "清", tags: "#间歇性踌躇满志 #持续性混吃等死 #文艺废柴", funDesc: "你的精神世界是一座无菌的象牙塔，但肉身却陷在生活的泥沼里。你爱读诗、爱作画，唯独不爱面对现实。面对心爱的人，你选择“用眼神拉丝”；面对家庭责任，你选择“装死”。", seriousDesc: "你是一只被折断翅膀的鸟，空有对蓝天的向往，却没有飞翔的力量。你善良、懦弱，对美有着深刻的感知，却被腐朽的家庭和自己孱弱的性格所吞噬。你与愫方的爱情，是你黑暗生活中唯一的光，但你连追光的勇气都没有。", scores: { tradition_vs_modern: 2, control_vs_freedom: -4, selfish_vs_selfless: -2, passive_vs_active: -5, idealist_vs_pragmatist: 5, inner_vs_outer: -5 } },
            { name: "曾思懿", image: "懿", tags: "#曾家CEO #情绪稳定地发疯 #PUA大师", funDesc: "你是这个家的实际掌权者，手握财政大权。你的座右铭是“家不是讲理的地方，是讲我规矩的地方”。表面上温文尔雅，转过身就能给你一个“死亡微笑”。", seriousDesc: "你用冷酷和算计为自己筑起了一座权力的堡垒，却也将自己囚禁其中。你是这个封建家庭制度最忠实的捍卫者，也是它最直接的受害者。你的强硬背后，是深深的不安和对未来的恐惧。你赢得了对家庭的控制，却输掉了所有人的心。", scores: { tradition_vs_modern: 4, control_vs_freedom: 5, selfish_vs_selfless: 4, passive_vs_active: 3, idealist_vs_pragmatist: -5, inner_vs_outer: 3 } },
            { name: "曾文彩", image: "彩", tags: "#精致的利己主义者 #人间清醒(对自己) #娘家-我的移动ATM", funDesc: "“谈钱伤感情？不，谈感情才伤钱！”这是你的人生信条。你像一只叽叽喳喳的花蝴蝶，飞舞在曾家这棵即将枯萎的大树上，只想啄食最后一点养分。你活得热烈而直接，从不内耗。", seriousDesc: "你是这个衰败家庭结出的另一颗恶果。你的自私和浅薄，是这个环境的产物。你没有文清的懦弱，也没有思懿的城府，你只是一个被物欲完全侵蚀的空心人。你对家庭的榨取，加速了它的崩溃。", scores: { tradition_vs_modern: -1, control_vs_freedom: 1, selfish_vs_selfless: 5, passive_vs_active: 2, idealist_vs_pragmatist: -4, inner_vs_outer: 5 } },
            { name: "曾霆", image: "霆", tags: "#叛逆期少年 #嘴强王者 #向往自由的风", funDesc: "你是这个沉闷大院里唯一会“动”的生物。你渴望挣脱牢笼，但不知道笼子外是什么。你血气方刚，却也鲁莽冲动，是这个家里为数不多的“希望”，虽然这希望看起来有点不靠谱。", seriousDesc: "你是新与旧交替的夹缝中，一个挣扎的灵魂。你身上有年轻一代的躁动和对自由的本能渴望，但旧家庭的阴影依然笼罩着你。你代表着一种未经雕琢的、原始的生命冲动，是这个行将就木的家庭里，唯一可能飞出去的希望。", scores: { tradition_vs_modern: -4, control_vs_freedom: -4, selfish_vs_selfless: -1, passive_vs_active: 4, idealist_vs_pragmatist: 2, inner_vs_outer: 3 } },
            { name: "曾瑞贞", image: "贞", tags: "#温室里的乖乖女 #内心戏超多 #暗恋天花板", funDesc: "你安静、乖巧，是这个家里最不起眼的存在，但你的内心世界却波涛汹涌。你像一株渴望阳光的含羞草，小心翼翼地伸出触角，试探着外面那个新奇的世界。", seriousDesc: "你是旧式家庭中女性悲剧命运的缩影。你温柔、善良，却注定要成为家族利益的牺牲品。你与愫方的情谊，是两个被囚禁的灵魂之间的相互慰藉。你对袁任敢的朦胧情愫，是你对新世界、新生活方式的向往，一个美好却易碎的梦。", scores: { tradition_vs_modern: 1, control_vs_freedom: -3, selfish_vs_selfless: -3, passive_vs_active: -3, idealist_vs_pragmatist: 3, inner_vs_outer: -4 } },
            { name: "江泰", image: "泰", tags: "#职业软饭人 #无赖界的“艺术家” #只要我不尴尬尴尬的就是别人", funDesc: "你将“寄生”演绎成了一门行为艺术。在这个家里，你吃、你拿、你闹，理直气壮，毫无心理负担。你的字典里没有“尊严”二字，只有“利益”。", seriousDesc: "你是一个毫无廉耻的市井无赖，是旧文明彻底腐化后的怪胎。你撕下了曾家最后一块遮羞布，用最赤裸的方式展现了人性中的贪婪与无耻。你的存在，像一面哈哈镜，照出了这个家庭的虚伪和不堪一击。", scores: { tradition_vs_modern: 1, control_vs_freedom: 2, selfish_vs_selfless: 5, passive_vs_active: 3, idealist_vs_pragmatist: -5, inner_vs_outer: 5 } },
            { name: "愫方", image: "愫", tags: "#人间小布丁(又苦又顶) #默默付出型人格 #灵魂捕手", funDesc: "你是这个窒息家庭里唯一的氧气。你温柔、善良、坚韧，用自己的隐忍和付出去承载着所有人的负能量。你心里有一片海，却沉默地把自己活成了一座孤岛。", seriousDesc: "你是剧中美的化身，是曹禺先生心中理想女性的代表。你兼具中国传统女性的温良与现代女性对独立、自由的追求。你的爱是无私的，你的苦是深重的。在黑暗的包围中，你始终守护着内心的那一点光。", scores: { tradition_vs_modern: 2, control_vs_freedom: -2, selfish_vs_selfless: -5, passive_vs_active: -2, idealist_vs_pragmatist: 3, inner_vs_outer: -5 } },
            { name: "陈奶妈", image: "陈", tags: "#温暖的大家长(非官方) #人间清醒的老好人 #孩子的守护神", funDesc: "你是这个冰冷大院里最温暖的炉火。你用朴素的善良和智慧，洞察着这个家里的每一个人。你心疼每一个受苦的孩子，想用自己微薄的力量为他们撑起一把伞。", seriousDesc: "你是旧时代底层劳动人民善良、坚韧品质的象征。在这个人人自危、相互倾轧的家庭里，你的存在是唯一的暖色。你对孩子们的爱是人性中最质朴的光辉，与曾家的冷漠自私形成了鲜明的对比。", scores: { tradition_vs_modern: 3, control_vs_freedom: -1, selfish_vs_selfless: -4, passive_vs_active: 1, idealist_vs_pragmatist: -2, inner_vs_outer: 1 } },
            { name: "小柱儿", image: "柱", tags: "#快乐儿童 #治愈系小天使 #全场唯一阳光", funDesc: "你是这个剧本里的一抹亮色，是行走的小太阳。你的世界简单而快乐，一个“刮打嘴”就能开心一整天。你代表着未经世事污染的纯真和希望。", seriousDesc: "你象征着新生、纯洁与未来。在成人世界的复杂和痛苦之外，你的存在本身就是一种希望。你简单而原始的快乐，反衬出成人世界的扭曲与沉重。你是这个即将崩塌的世界里，一颗尚未被污染的种子。", scores: { tradition_vs_modern: 0, control_vs_freedom: 0, selfish_vs_selfless: 0, passive_vs_active: 3, idealist_vs_pragmatist: 0, inner_vs_outer: 3 } },
            { name: "张顺", image: "顺", tags: "#曾家老员工 #最佳旁观者 #打工人实录", funDesc: "你是这个家的“活历史”，见证了它的繁华与衰败。你忠诚，但不愚忠；你顺从，但心里有杆秤。你像一个沉默的镜头，记录着这里发生的一切。", seriousDesc: "你代表了那些被时代洪流裹挟的普通人。你勤恳、本分，对旧主有着传统的忠诚，但现实的残酷也让你看得分明。你是这个悲剧最忠实的见证者，你的沉默与叹息，是历史无声的回响。", scores: { tradition_vs_modern: 3, control_vs_freedom: 0, selfish_vs_selfless: -2, passive_vs_active: -1, idealist_vs_pragmatist: -3, inner_vs_outer: -2 } },
            { name: "袁任敢", image: "敢", tags: "#人类学霸 #行走的百科全书 #理论大师情感小白", funDesc: "你是一个来自“新世界”的闯入者。你用科学、理性的视角来分析这个家庭，仿佛在观察一个即将灭绝的部落。你是“行走的知识付费”，但情感账户余额不足。", seriousDesc: "你象征着“五四”以来的科学与民主精神。你为这个封闭的家庭带来了一股新鲜的空气，你的思想是照进黑暗的一束光。然而，你终究是一个冷静的观察者，而非热情的参与者。", scores: { tradition_vs_modern: -5, control_vs_freedom: 0, selfish_vs_selfless: 0, passive_vs_active: 2, idealist_vs_pragmatist: -2, inner_vs_outer: -1 } },
            { name: "袁园", image: "园", tags: "#元气少女 #人间小野马 #专治各种不服", funDesc: "你是“北京人”这个名字的另一层含义——原始、野性、充满生命力。你像一阵风，一阵雨，一阵闪电，猛烈地冲击着曾家腐朽的围墙。你是行走的“多巴胺”，是所有被压抑灵魂的梦。", seriousDesc: "你是一个象征性的人物，代表着被文明压抑的原始生命力和本能。你自由、健康、无拘无束，与曾家所有人的病态、压抑形成鲜明对比。你是对“文明”的拷问，也是对“新生”的呼唤。", scores: { tradition_vs_modern: -5, control_vs_freedom: -5, selfish_vs_selfless: 0, passive_vs_active: 5, idealist_vs_pragmatist: 2, inner_vs_outer: 5 } },
            { name: "猿人", image: "猿", tags: "#终极自由 #返璞归真 #规则？不存在的", funDesc: "恭喜你，你已经超越了凡俗的困扰，达到了“天人合一”的境界。你不被任何社会规则、家庭关系、金钱情感所束缚。你就是生命力本身，是旷野的风，是山间的泉。", seriousDesc: "你是这部剧的灵魂与象征，是一个精神图腾。你代表着过去，那个充满力量、与自然合一的原始时代；你也代表着未来，人类挣脱一切文明的枷锁后，所能达到的终极自由。", scores: { tradition_vs_modern: -5, control_vs_freedom: -5, selfish_vs_selfless: 0, passive_vs_active: 5, idealist_vs_pragmatist: 5, inner_vs_outer: 0 } }
        ];

        const questions = [
            { question: "清晨醒来，你更愿意如何度过第一个小时？", answers: [
                { text: "泡一壶好茶，翻阅一本旧书，享受宁静。", scores: { tradition_vs_modern: 1, idealist_vs_pragmatist: 1, inner_vs_outer: -1 } },
                { text: "立刻出门晨跑，感受风和阳光。", scores: { passive_vs_active: 1, control_vs_freedom: -1, inner_vs_outer: 1 } },
                { text: "规划好一天的任务，确保一切尽在掌握。", scores: { control_vs_freedom: 1, idealist_vs_pragmatist: -1, passive_vs_active: 1 } },
                { text: "赖在床上，直到最后一刻才慢悠悠地起来。", scores: { passive_vs_active: -1, control_vs_freedom: -1 } }
            ]},
            { question: "你如何看待“家”这个概念？", answers: [
                { text: "是规矩和传承的圣地，每个人都应恪守本分。", scores: { tradition_vs_modern: 2, control_vs_freedom: 1 } },
                { text: "是温暖的港湾，应该充满爱与奉献。", scores: { selfish_vs_selfless: -1, idealist_vs_pragmatist: 1 } },
                { text: "是一个需要共同经营的现实单位，利益和责任很重要。", scores: { selfish_vs_selfless: 1, idealist_vs_pragmatist: -1 } },
                { text: "可能是一个牢笼，我渴望外面的世界。", scores: { control_vs_freedom: -2, tradition_vs_modern: -1 } }
            ]},
            { question: "朋友向你倾诉烦恼，你的第一反应是？", answers: [
                { text: "安静地倾听，默默陪伴，感同身受。", scores: { selfish_vs_selfless: -1, inner_vs_outer: -1 } },
                { text: "立刻开始分析问题，给出逻辑清晰的解决方案。", scores: { idealist_vs_pragmatist: -1, passive_vs_active: 1 } },
                { text: "用自己的经历鼓励对方，告诉他“这都不是事儿！”", scores: { inner_vs_outer: 1, selfish_vs_selfless: 1 } },
                { text: "感到有些无措，不知道如何回应这种强烈的情感。", scores: { inner_vs_outer: -1, passive_vs_active: -1 } }
            ]},
            { question: "面对一项枯燥但必须完成的工作，你会？", answers: [
                { text: "强迫自己高效完成，纪律是第一生产力。", scores: { control_vs_freedom: 1, passive_vs_active: 1 } },
                { text: "拖延，直到最后期限才敷衍了事。", scores: { passive_vs_active: -2 } },
                { text: "一边抱怨一边做，但还是会把它做完。", scores: { inner_vs_outer: 1, passive_vs_active: 0 } },
                { text: "想办法把它变得有趣，或者找人帮忙。", scores: { selfish_vs_selfless: 1, control_vs_freedom: -1 } }
            ]},
            { question: "你认为什么东西最能给你带来安全感？", answers: [

        // --- DOM Elements ---
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        
        const questionEl = document.getElementById('question');
        const answersEl = document.getElementById('answers');
        const progressEl = document.getElementById('progress');

        const characterImageEl = document.getElementById('character-image');
        const characterNameEl = document.getElementById('character-name');
        const similarityEl = document.getElementById('similarity');
        const tagsEl = document.getElementById('tags');
        const funDescEl = document.getElementById('fun-desc');
        const seriousDescEl = document.getElementById('serious-desc');
        
        // --- State ---
        let currentQuestionIndex = 0;
        let userScores = {
            tradition_vs_modern: 0,
            control_vs_freedom: 0,
            selfish_vs_selfless: 0,
            passive_vs_active: 0,
            idealist_vs_pragmatist: 0,
            inner_vs_outer: 0
        };

        // --- Functions ---

        function startQuiz() {
            currentQuestionIndex = 0;
            userScores = { tradition_vs_modern: 0, control_vs_freedom: 0, selfish_vs_selfless: 0, passive_vs_active: 0, idealist_vs_pragmatist: 0, inner_vs_outer: 0 };
            startScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const questionData = questions[currentQuestionIndex];
            questionEl.textContent = questionData.question;
            answersEl.innerHTML = '';
            
            // Animate new question
            const questionContainer = document.getElementById('question-container');
            questionContainer.style.animation = 'none';
            void questionContainer.offsetWidth; // Trigger reflow
            questionContainer.style.animation = 'fadeIn 0.5s ease';

            questionData.answers.forEach(answer => {
                const button = document.createElement('button');
                button.textContent = answer.text;
                button.classList.add('answer-btn');
                button.onclick = () => selectAnswer(answer.scores);
                answersEl.appendChild(button);
            });
            updateProgress();
        }
        
        function selectAnswer(scores) {
            for (const key in scores) {
                if (userScores.hasOwnProperty(key)) {
                    userScores[key] += scores[key];
                }
            }
            
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                calculateResult();
            }
        }
        
        function updateProgress() {
            const progressPercentage = (currentQuestionIndex / questions.length) * 100;
            progressEl.style.width = `${progressPercentage}%`;
        }
        
        function calculateResult() {
            let bestMatch = null;
            let minDistance = Infinity;

            characters.forEach(character => {
                let distance = 0;
                for (const key in userScores) {
                    distance += Math.pow(userScores[key] - character.scores[key], 2);
                }
                distance = Math.sqrt(distance);
                
                if (distance < minDistance) {
                    minDistance = distance;
                    bestMatch = character;
                }
            });
            
            // Calculate a plausible similarity score
            // This is a simplified model for demonstration
            const maxPossibleDistance = 40; // Estimated max distance
            let similarityPercentage = Math.max(0, 100 - (minDistance / maxPossibleDistance) * 100);
            similarityPercentage = Math.min(99, Math.floor(similarityPercentage) + 5); // Ensure it feels high
            
            showResult(bestMatch, similarityPercentage);
        }

        function showResult(character, similarityPercentage) {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            
            characterImageEl.textContent = character.image;
            characterNameEl.textContent = character.name;
            similarityEl.textContent = `与 ${character.name} 的相似度为 ${similarityPercentage}%`;
            tagsEl.textContent = character.tags;
            funDescEl.textContent = character.funDesc;
            seriousDescEl.textContent = character.seriousDesc;
        }

        // --- Event Listeners ---
        startBtn.addEventListener('click', startQuiz);
        restartBtn.addEventListener('click', startQuiz);

    </script>
